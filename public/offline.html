<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Kinē</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111111;
      color: #f0ebe6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 320px; }
    .logo {
      font-size: 1.25rem;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
      color: #c49098;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.8125rem;
      color: #8a7a5a;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    button {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #f0ebe6;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.8125rem;
      cursor: pointer;
    }
    button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">KINĒ</div>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Your workout data is saved locally and will sync when you're back online.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
